<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Transparency & Layout */
        body { 
            background: transparent; 
            color: #eee; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 10px; 
            overflow-x: hidden;
        }

        /* Waveform Styling */
        #waveform { 
            width: 100%; 
            height: 128px; 
            background: rgba(255, 255, 255, 0.03); /* Very slight tint for depth */
            border-radius: 12px; 
            margin-bottom: 20px; 
            cursor: pointer;
            transition: filter 0.3s ease, transform 0.3s ease;
        }

        /* "Light up" effect on hover */
        #waveform:hover {
            filter: brightness(1.4) drop-shadow(0 0 10px rgba(0, 255, 136, 0.2));
        }

        /* Playlist Styling */
        .playlist { list-style: none; padding: 0; border-top: 1px solid rgba(255,255,255,0.1); }
        .track { 
            padding: 14px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            transition: 0.2s;
            background: transparent;
        }
        .track:hover { background: rgba(255, 255, 255, 0.05); }
        .track.active { color: #00ff88; font-weight: bold; }

        /* Controls */
        .controls { display: flex; gap: 15px; align-items: center; margin-bottom: 15px; }
        
        #playBtn { 
            background: transparent; 
            border: 1px solid rgba(255,255,255,0.2); 
            color: #00ff88; 
            width: 45px;
            height: 45px;
            border-radius: 50%; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        #playBtn:hover {
            border-color: #00ff88;
            transform: scale(1.05);
        }
        
        #currentTitle { font-size: 0.9rem; letter-spacing: 0.5px; opacity: 0.8; }
    </style>
</head>
<body>

    <div class="controls">
        <button id="playBtn">
            <i data-lucide="play" id="playIcon"></i>
        </button>
        <span id="currentTitle">Select a track</span>
    </div>

    <div id="waveform"></div>

    <ul class="playlist" id="playlist">
        </ul>

    <script type="module">
    import WaveSurfer from 'https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.esm.js'

    const tracks = [
        { name: "Heavy Kick Sample", url: "https://raw.githubusercontent.com/iexii/player/main/testt.mp3" },
        { name: "Dark Snare 01", url: "https://raw.githubusercontent.com/iexii/player/main/testt.mp3" },
        { name: "Atmospheric Pad", url: "https://raw.githubusercontent.com/iexii/player/main/testt.mp3" }
    ];

    let currentTrackIndex = 0;

    const wavesurfer = WaveSurfer.create({
        container: '#waveform',
        waveColor: '#444',
        progressColor: '#00ff88',
        cursorColor: '#00ff88',
        barWidth: 2,
        barGap: 3,
        height: 128,
        backend: 'MediaElement'
    });

    const playlistElem = document.getElementById('playlist');
    const titleElem = document.getElementById('currentTitle');
    const playBtn = document.getElementById('playBtn');

    // Helper to refresh the icon inside the button
    function updateIcon(isPlaying) {
        playBtn.innerHTML = isPlaying 
            ? '<i data-lucide="pause"></i>' 
            : '<i data-lucide="play"></i>';
        lucide.createIcons(); // Tells Lucide to look for the new <i> tag
    }

    // Render Playlist
    tracks.forEach((track, index) => {
        const li = document.createElement('li');
        li.classList.add('track');
        li.innerHTML = `<span>${track.name}</span>`;
        li.onclick = () => playTrack(index, true); // User click ALWAYS plays
        playlistElem.appendChild(li);
    });

    function playTrack(index, shouldPlay = true) {
        currentTrackIndex = index;
        const track = tracks[index];
        
        document.querySelectorAll('.track').forEach((t, i) => {
            t.classList.toggle('active', i === index);
        });
        titleElem.innerText = track.name;

        wavesurfer.load(track.url);

        if (shouldPlay) {
            wavesurfer.once('ready', () => {
                wavesurfer.play();
            });
        }
    }

    // Icon state listeners
    wavesurfer.on('play', () => updateIcon(true));
    wavesurfer.on('pause', () => updateIcon(false));

    // Handle track finishing
    wavesurfer.on('finish', () => {
        let nextIndex = currentTrackIndex + 1;
        
        // Check if there actually IS a next track
        if (nextIndex < tracks.length) {
            playTrack(nextIndex, true);
        } else {
            // End of playlist: stop and show play icon
            updateIcon(false);
        }
    });

    playBtn.onclick = () => wavesurfer.playPause();

    // Initial Setup: Initialize Lucide and load first track (no autoplay)
    lucide.createIcons();
    playTrack(0, false);
</script>
</body>
</html>
