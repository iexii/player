<!DOCTYPE html>

<html>
<head>
  <meta charset="UTF-8">
  <title>Player</title>

  <!-- WaveSurfer CDN -->

  <script src="https://unpkg.com/wavesurfer.js"></script>

  <style>
    body {
      margin: 0;
      background: #0D0D0D;
      font-family: Arial, sans-serif;
      color: white;
    }

    #waveform {
      margin: 10px;
    }

    button {
      margin: 10px;
      padding: 8px 12px;
      background: #FF3B3B;
      border: none;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>

</head>

<body>

  <div id="waveform"></div>

<button id="playBtn">▶ Play</button>

  <script>
    // Get audio URL from ?audio=
    const params = new URLSearchParams(window.location.search);
    const audioUrl = params.get('audio');

    // Create player
    const wavesurfer = WaveSurfer.create({
      container: '#waveform',
      waveColor: '#444',
      progressColor: '#FF3B3B',
      height: 80
    });

    // Load audio
    if (audioUrl) {
      wavesurfer.load(audioUrl);
    } else {
      alert("No audio URL provided");
    }

    // Play button
    const btn = document.getElementById('playBtn');

    btn.onclick = () => {
      wavesurfer.playPause();
    };

    // Enable button only when ready
    wavesurfer.on('ready', () => {
      btn.style.opacity = "1";
      btn.disabled = false;
    });

    // Disable button until loaded
    btn.disabled = true;
    btn.style.opacity = "0.5";

    // Debug errors (IMPORTANT)
    wavesurfer.on('error', (e) => {
      console.error("WaveSurfer error:", e);
      alert("Audio failed to load. Check your link.");
    });
  </script>

</body>
</html>
