<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            background: transparent; 
            color: #eee; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 20px; 
        }

        .sample-list { list-style: none; padding: 0; }

        /* Individual Track Row */
        .track-row { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            padding: 15px 0; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.2s;
        }
        .track-row:hover { background: rgba(255,255,255,0.02); }

        /* Play Button Styling */
        .play-btn { 
            background: transparent; 
            border: 1px solid rgba(0, 255, 136, 0.3); 
            color: #00ff88; 
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            flex-shrink: 0; /* Keeps button from squishing */
        }
        .play-btn:hover { border-color: #00ff88; background: rgba(0, 255, 136, 0.05); }

        /* Track Info */
        .track-info { width: 150px; flex-shrink: 0; font-size: 0.9rem; font-weight: 500; }

        /* The Waveform for this specific track */
        .waveform-container { 
            flex-grow: 1; 
            height: 40px; 
            cursor: pointer; 
            filter: brightness(0.8);
            transition: filter 0.2s;
        }
        .waveform-container:hover { filter: brightness(1.2); }

    </style>
</head>
<body>

    <div class="sample-list" id="sample-list">
        </div>

    <script type="module">
        import WaveSurfer from 'https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.esm.js'

        const tracksData = [
            { name: "Heavy Kick", url: "https://raw.githubusercontent.com/iexii/player/main/testt.mp3" },
            { name: "Dark Snare 01", url: "https://raw.githubusercontent.com/iexii/player/main/testt.mp3" },
            { name: "Atmospheric Pad", url: "https://raw.githubusercontent.com/iexii/player/main/testt.mp3" }
        ];

        const allInstances = [];

        const listContainer = document.getElementById('sample-list');

        tracksData.forEach((track, index) => {
            // 1. Create the HTML elements for this row
            const row = document.createElement('div');
            row.className = 'track-row';

            row.innerHTML = `
                <button class="play-btn" id="btn-${index}">
                    <i data-lucide="play"></i>
                </button>
                <div class="track-info">${track.name}</div>
                <div class="waveform-container" id="wave-${index}"></div>
            `;

            listContainer.appendChild(row);

            // 2. Initialize WaveSurfer for this specific row
            const ws = WaveSurfer.create({
                container: `#wave-${index}`,
                waveColor: '#444',
                progressColor: '#00ff88',
                barWidth: 2,
                barGap: 3,
                height: 40, // Shorter height for the list view
                url: track.url,
                backend: 'MediaElement'
            });

            // Keep track of this instance
            allInstances.push({ ws, index });

            // 3. Logic: When this one plays, stop all others
            ws.on('play', () => {
                allInstances.forEach(item => {
                    if (item.index !== index) item.ws.pause();
                });
                updateRowIcon(index, true);
            });

            ws.on('pause', () => updateRowIcon(index, false));
            
            // When finished, just reset the icon
            ws.on('finish', () => updateRowIcon(index, false));

            // Button click logic
            document.getElementById(`btn-${index}`).onclick = () => ws.playPause();
        });

        // Helper to swap icons
        function updateRowIcon(index, isPlaying) {
            const btn = document.getElementById(`btn-${index}`);
            btn.innerHTML = isPlaying ? '<i data-lucide="pause"></i>' : '<i data-lucide="play"></i>';
            lucide.createIcons();
        }

        lucide.createIcons();
    </script>
</body>
</html>
